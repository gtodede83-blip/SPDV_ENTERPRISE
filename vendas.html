<!DOCTYPE html><html lang='pt-BR'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>SPDV Enterprise - Vendas</title><link rel='stylesheet' href='css/layout.css'><link rel='stylesheet' href='css/menu.css'><style>body{font-family:Arial;background:#f4f6f9;margin:0}.topo{background:#003366;color:#fff;padding:15px 20px;display:flex;justify-content:space-between}.container{width:95%;margin:20px auto}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}.card{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.15)}.valor{font-size:28px;color:#003366;font-weight:bold}.filtros{display:flex;gap:10px;margin:20px 0;flex-wrap:wrap}input,select,button{padding:10px}button{background:#003366;color:#fff}table{width:100%;border-collapse:collapse;background:#fff}th{background:#003366;color:#fff;padding:10px}td{padding:8px;border:1px solid #ddd;text-align:center}</style></head><body><div class='topo'><div><button onclick='toggleMenu()'>☰</button> <b>SPDV Enterprise - Vendas</b></div><div>Operador: <b>Admin</b></div></div><div id='menu'></div><div class='container'><div class='cards'><div class='card'><div>Vendas Hoje</div><div class='valor' id='vHoje'>R$0,00</div></div><div class='card'><div>Vendas Totais</div><div class='valor' id='vMes'>R$0,00</div></div><div class='card'><div>Quantidade</div><div class='valor' id='qtd'>0</div></div><div class='card'><div>Ticket Médio</div><div class='valor' id='ticket'>R$0,00</div></div></div><div class='filtros'><select id='pagamento'><option value=''>Todos</option><option>DINHEIRO</option><option>PIX</option><option>CRÉDITO</option><option>DÉBITO</option></select><button onclick='carregar()'>Atualizar</button><button onclick='window.print()'>Imprimir</button><button onclick='excel()'>Excel</button></div><table id='tab'><thead><tr><th>ID</th><th>Data</th><th>Pagamento</th><th>Total</th></tr></thead><tbody></tbody></table></div><script>async function carregar(){const r=await fetch('https://spdv-enterprises.onrender.com/relatorios/vendas');const d=await r.json();const tb=document.querySelector('#tab tbody');tb.innerHTML='';let t=0;let h=new Date().toISOString().slice(0,10),th=0;d.forEach(v=>{let pg=v.forma_pagamento||v.pagamento||'';if(document.getElementById('pagamento').value&&pg!==document.getElementById('pagamento').value)return;t+=Number(v.total);if((v.data||'').slice(0,10)===h)th+=Number(v.total);tb.innerHTML+=`<tr><td>${v.id}</td><td>${new Date(v.data).toLocaleString('pt-BR')}</td><td>${pg}</td><td>R$ ${Number(v.total).toFixed(2)}</td></tr>`});document.getElementById('vHoje').innerText='R$ '+th.toFixed(2);document.getElementById('vMes').innerText='R$ '+t.toFixed(2);document.getElementById('qtd').innerText=tb.rows.length;document.getElementById('ticket').innerText='R$ '+(tb.rows.length?t/tb.rows.length:0).toFixed(2)}function excel(){let a=document.createElement('a');a.href='data:application/vnd.ms-excel,'+encodeURIComponent(document.getElementById('tab').outerHTML);a.download='vendas.xls';a.click()}carregar();</script><script src='js/layout.js'></script><script src='js/menu.js'></script></body></html>
