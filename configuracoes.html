<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SPDV Enterprise - Configurações</title>

<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/menu.css">

<style>

.container{
    width:95%;
    margin:auto;
    margin-top:25px;
}

.card{

    background:#fff;
    border-radius:10px;
    padding:25px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    margin-bottom:20px;

}

.card h2{

    color:#003366;
    margin-bottom:20px;

}

.linha{

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:15px;

}

input,
select{

    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;

}

button{

    background:#003366;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;

}

button:hover{

    background:#004d99;

}

</style>

</head>

<body>

<div class="topo">

<div style="display:flex;align-items:center;gap:15px;">

<button id="btnMenu" onclick="toggleMenu()">
☰
</button>

<h1>SPDV Enterprise - Configurações</h1>

</div>

<div>

Operador:
<b id="operador">Admin</b>

</div>

</div>

<div id="menuLateral"></div>

<div class="container">

<div class="card">

<h2>Empresa</h2>

<div class="linha">

<input
id="empresa"
placeholder="Nome da Empresa">

<input
id="telefone"
placeholder="Telefone">

</div>

<div class="linha">

<input
id="endereco"
placeholder="Endereço">

<input
id="cidade"
placeholder="Cidade">

</div>

</div>

<div class="card">

<h2>Usuário</h2>

<div class="linha">

<input
id="senhaAtual"
type="password"
placeholder="Senha Atual">

<input
id="novaSenha"
type="password"
placeholder="Nova Senha">

</div>

<button onclick="alterarSenha()">

Alterar Senha

</button>

</div>

<div class="card">

<h2>Sistema</h2>

<div class="linha">

<select id="tema">

<option>Azul</option>
<option>Escuro</option>
<option>Claro</option>

</select>

<select id="impressora">

<option>Padrão</option>
<option>Bem
