<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SPDV Enterprise - Usuários</title>

<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/menu.css">

<style>

.container{
    width:95%;
    margin:auto;
    margin-top:25px;
}

.card{
    background:#fff;
    border-radius:10px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.linha{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-bottom:15px;
}

input,select{

    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;

}

button{

    background:#003366;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;

}

button:hover{
    background:#004b99;
}

table{

    width:100%;
    border-collapse:collapse;
    margin-top:25px;
    background:white;

}

th{

    background:#003366;
    color:white;
    padding:12px;

}

td{

    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:center;

}

.btnExcluir{

    background:#d32f2f;

}

.btnEditar{

    background:#f57c00;

}

.btnSenha{
    background:#1976d2;
    margin-left:4px;
}

.btnBloquear{
    background:#616161;
    margin-left:4px;
}

.btnEditar,
.btnSenha,
.btnBloquear,
.btnExcluir{

    width:38px;
    height:38px;
    padding:0;
    border-radius:6px;
    font-size:18px;

}

</style>

</head>

<body>

<div class="topo">

<div style="display:flex;align-items:center;gap:15px;">

<button id="btnMenu" onclick="toggleMenu()">
☰
</button>

<h1>SPDV Enterprise - Usuários</h1>

</div>

<div id="usuario">
Operador: Admin
</div>

</div>

<<div id="menuLateral"></div>

<div class="container">

<div class="card">

<div class="linha">

<input
id="nome"
placeholder="Nome Completo">

<input
id="login"
placeholder="Login">

</div>

<div class="linha">

<input
id="senha"
type="password"
placeholder="Senha">

<select id="perfil">

<option>Administrador</option>
<option>Supervisor</option>
<option>Operador</option>
<option>Caixa</option>

</select>

</div>

<button onclick="salvarUsuario()">
SALVAR USUÁRIO
</button>

</div>

<table>

<thead>

<tr>

<th>ID</th>
<th>Nome</th>
<th>Login</th>
<th>Perfil</th>
<th>Ações</th>

</tr>

<button class="btnEditar" onclick="editar(1)">✏️</button>

<button class="btnSenha" onclick="redefinirSenha(1)">🔑</button>

<button class="btnBloquear" onclick="bloquear(1)">🔒</button>

<button class="btnExcluir" disabled>🗑️</button>

</thead>

<tbody id="listaUsuarios">

</tbody>

</table>

</div>

<script>

async function carregarUsuarios(){

    const resposta =
    await fetch("https://spdv-enterprises.onrender.com/usuarios");

    const dados =
    await resposta.json();

    let html="";

    dados.forEach(u=>{

        html+=`

        <tr>

        <td>${u.id}</td>

        <td>${u.nome}</td>

        <td>${u.usuario}</td>

        <td>${u.perfil}</td>

       <td>

       <button
       class="btnEditar"
       onclick="editar(${u.id})"
       title="Editar">

       ✏️

       </button>

      <button
       class="btnSenha"
       onclick="redefinirSenha(${u.id})"
       title="Redefinir Senha">

       🔑

       </button>

       <button
       class="btnBloquear"
       onclick="bloquear(${u.id})"
       title="Bloquear">

      🔒

      </button>

      ${
      u.usuario.toLowerCase()=="admin"
      ?
      `<button class="btnExcluir" disabled>🗑️</button>`
      :
     `<button class="btnExcluir" onclick="excluir(${u.id})">🗑️</button>`
      }

        </td>

        </tr>

        `;

    });

    document
    .getElementById("listaUsuarios")
    .innerHTML=html;

}

async function salvarUsuario(){

    await fetch(

    "https://spdv-enterprises.onrender.com/usuarios",

    {

        method:"POST",

        headers:{

            "Content-Type":"application/json"

        },

        body:JSON.stringify({

            nome:
            document.getElementById("nome").value,

            usuario:
            document.getElementById("login").value,

            senha:
            document.getElementById("senha").value,

            perfil:
            document.getElementById("perfil").value

        })

    });

    alert("Usuário salvo com sucesso!");

    carregarUsuarios();

}

async function excluir(id){

    if(!confirm("Excluir usuário?"))
    return;

    await fetch(

    "https://spdv-enterprises.onrender.com/usuarios/"+id,

    {

        method:"DELETE"

    });

    carregarUsuarios();

}

function editar(id){

    alert("Editar usuário: "+id);

}

carregarUsuarios();

async function redefinirSenha(id){

    const senha = prompt("Digite a nova senha:");

    if(!senha) return;

    const resposta = await fetch(

        "https://spdv-enterprises.onrender.com/usuarios/"+id+"/senha",

        {

            method:"PUT",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                senha:senha
            })

        }

    );

    const dados = await resposta.json();

    alert(dados.mensagem);

}

async function bloquear(id){

    if(!confirm("Alterar situação deste usuário?"))
        return;

    const resposta = await fetch(

        "https://spdv-enterprises.onrender.com/usuarios/"+id+"/bloquear",

        {
            method:"PUT"
        }

    );

    const dados = await resposta.json();

    alert(dados.mensagem);

    carregarUsuarios();

}

</script>

<script src="js/layout.js"></script>
<script src="js/menu.js"></script>

</body>
</html>
