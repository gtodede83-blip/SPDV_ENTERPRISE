<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPDV Enterprise - Produtos</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#003366;
    color:white;
    padding:15px;
}

.container{
    width:95%;
    margin:20px auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:12px 20px;
    margin-top:15px;
    background:#003366;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:white;
}

th{
    background:#003366;
    color:white;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

.excluir{
    background:red;
}
</style>
</head>
<body>

<header>
<h1>SPDV ENTERPRISE - Cadastro de Produtos</h1>
</header>

<div class="container">

<div class="card">

<input type="text" id="codigo" placeholder="Código de Barras">

<input type="text" id="produto" placeholder="Nome do Produto">

<input type="number" id="preco" placeholder="Preço de Venda">

<input type="number" id="estoque" placeholder="Quantidade em Estoque">

<button onclick="salvarProduto()">Salvar Produto</button>

</div>

<table>

<thead>
<tr>
<th>Código</th>
<th>Produto</th>
<th>Preço</th>
<th>Estoque</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="listaProdutos">

</tbody>

</table>

</div>

<script>

async function listarProdutos(){

    let resposta = await fetch("https://spdv-enterprises.onrender.com/produtos");

    let produtos = await resposta.json();

    let tabela = "";

    produtos.forEach((p)=>{

        tabela += `
        <tr>
            <td>${p.codigo}</td>
            <td>${p.descricao}</td>
            <td>R$ ${p.preco}</td>
            <td>${p.estoque}</td>
            <td>
                <button onclick="excluirProduto(${p.id})"
                class="excluir">
                Excluir
                </button>
            </td>
        </tr>
        `;

    });

    document.getElementById("listaProdutos").innerHTML = tabela;

}

async function excluirProduto(id){

    if(!confirm("Deseja excluir este produto?"))
        return;

    await fetch(`https://spdv-enterprises.onrender.com/produtos/${id}`,{
        method:"DELETE"
    });

    listarProdutos();

}

async function salvarProduto(){

    let codigo = document.getElementById("codigo").value;
    let descricao = document.getElementById("produto").value;
    let preco = document.getElementById("preco").value;
    let estoque = document.getElementById("estoque").value;

    if(codigo=="" || descricao==""){
        alert("Preencha os campos!");
        return;
    }

    await fetch("https://spdv-enterprises.onrender.com/produtos",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            codigo,
            descricao,
            preco,
            estoque
        })

    });

    document.getElementById("codigo").value="";
    document.getElementById("produto").value="";
    document.getElementById("preco").value="";
    document.getElementById("estoque").value="";

    listarProdutos();

}

listarProdutos();

</script>

</body>
</html>
