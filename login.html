<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPDV Enterprise - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#003366,#0d1b2a);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login{
    width:350px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

h1{
    text-align:center;
    color:#003366;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:#003366;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#00509e;
}

.rodape{
    text-align:center;
    margin-top:20px;
    color:#666;
}
</style>
</head>
<body>

<div class="login">

<h1>SPDV ENTERPRISE</h1>

<input type="text" id="usuario" placeholder="Usuário">

<input type="password" id="senha" placeholder="Senha">

<button onclick="entrar()">ENTRAR</button>

<div class="rodape">
Versão 1.0
</div>

</div>

<script>

async function entrar(){

    let login = document.getElementById("usuario").value;
    let senha = document.getElementById("senha").value;

    try{

        let resposta = await fetch(
            "https://spdv-enterprises.onrender.com/login",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    login,
                    senha
                })
            }
        );

        if(!resposta.ok){

            alert("Usuário ou senha inválidos!");

            return;

        }

        let usuario = await resposta.json();

        localStorage.setItem(
            "usuario",
            JSON.stringify(usuario)
        );

        window.location.href = "index.html";

    }
    catch(erro){

        console.log(erro);

        alert("Erro ao conectar com o servidor");

    }

}

</script>

</body>
</html>
