<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SPDV Enterprise - Relatórios</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}body{background:#f4f6f9}header{background:#003366;color:#fff;padding:15px 20px;display:flex;justify-content:space-between}.container{padding:20px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-bottom:20px}.card,.filtros{background:#fff;padding:18px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.15)}.valor{font-size:30px;color:#003366;font-weight:bold}table{width:100%;border-collapse:collapse;background:#fff;margin-top:20px}th{background:#003366;color:#fff}th,td{padding:10px;border:1px solid #ddd;text-align:center}input,select,button{padding:10px;margin:5px}button{background:#003366;color:#fff;border:none;border-radius:5px}</style></head><body><header><h2>📈 SPDV Enterprise - Relatórios</h2><div>Operador: <b>Admin</b></div></header><div class="container"><div class="cards"><div class="card"><h3>Vendas Hoje</h3><div class="valor" id="vendasHoje">R$ 0,00</div></div><div class="card"><h3>Vendas do Mês</h3><div class="valor" id="vendasMes">R$ 0,00</div></div><div class="card"><h3>Quantidade</h3><div class="valor" id="qtdVendas">0</div></div><div class="card"><h3>Ticket Médio</h3><div class="valor" id="ticketMedio">R$ 0,00</div></div></div><div class="filtros"><input type="date"><input type="date"><select><option>Todos</option><option>PIX</option><option>DINHEIRO</option><option>CRÉDITO</option><option>DÉBITO</option></select><button onclick="carregarRelatorio()">Atualizar</button></div><table><thead><tr><th>ID</th><th>Data</th><th>Pagamento</th><th>Total</th></tr></thead><tbody id="listaVendas"><tr><td colspan='4'>Carregando...</td></tr></tbody></table></div><script>async function carregarRelatorio(){try{const r=await fetch('https://spdv-enterprises.onrender.com/relatorios/vendas');if(!r.ok){document.getElementById('listaVendas').innerHTML='<tr><td colspan=4>Crie a rota /relatorios/vendas no server.js</td></tr>';return;}const v=await r.json();let h='',t=0;v.forEach(x=>{t+=Number(x.total);h+=`<tr><td>${x.id}</td><td>${new Date(x.data_venda).toLocaleString('pt-BR')}</td><td>${x.pagamento}</td><td>R$ ${Number(x.total).toFixed(2)}</td></tr>`});document.getElementById('listaVendas').innerHTML=h||'<tr><td colspan=4>Nenhuma venda.</td></tr>';document.getElementById('qtdVendas').textContent=v.length;document.getElementById('vendasHoje').textContent='R$ '+t.toFixed(2);document.getElementById('vendasMes').textContent='R$ '+t.toFixed(2);document.getElementById('ticketMedio').textContent='R$ '+(v.length?t/v.length:0).toFixed(2);}catch(e){document.getElementById('listaVendas').innerHTML='<tr><td colspan=4>Erro ao conectar.</td></tr>';}}carregarRelatorio();</script></body></html>
