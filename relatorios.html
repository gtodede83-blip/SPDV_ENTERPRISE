<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SPDV Enterprise V2 - Relatórios</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/menu.css">
<link rel="stylesheet" href="css/layout.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

    margin:0;

    background:#eef2f7;

}

.container{

    width:95%;

    margin:auto;

    margin-top:20px;

}

.top{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}

.cards{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;

}

.card{

    background:#fff;

    border-radius:10px;

    box-shadow:0 2px 10px rgba(0,0,0,.12);

    padding:18px;

}

.card h3{

    font-size:15px;

    color:#666;

}

.card h2{

    font-size:36px;

    color:#003366;

}

.filtros{

    background:white;

    padding:15px;

    border-radius:10px;

    box-shadow:0 2px 8px rgba(0,0,0,.08);

}

input,button{

padding:10px;
border-radius:8px;
border:1px solid #ddd;

}

button{

    background:#003366;

    color:white;

    border:none;

    border-radius:6px;

    padding:10px 18px;

    cursor:pointer;

}

button:hover{

    background:#004d99;

}

table{

width:100%;
background:white;
border-collapse:collapse;
border-radius:12px;
overflow:hidden;

}

th{

    background:#003366;

    color:white;

    font-size:16px;

    padding:14px;

}

td{

    padding:12px;

    border-bottom:1px solid #e5e5e5;

}

tr:hover{

    background:#f4f8ff;

}

canvas{

    background:white;

    height:320px !important;

    max-height:320px;

    padding:20px;

    border-radius:10px;

    margin-top:20px;

}

</style>

</head>

<body>

<div class="topo">

    <div style="display:flex;align-items:center;gap:15px;">

        <button id="btnMenu" onclick="toggleMenu()">
    ☰
</button>

        <h1>SPDV Enterprise - Relatórios</h1>

    </div>

    <div id="usuario">
        Operador: Admin
    </div>

</div>

<div id="menu"></div>

<div class="container">

<div class="top">

<h1>Relatórios</h1>

<div>

<button onclick="window.print()">Imprimir</button>

<button onclick="exportarExcel()">Excel</button>

</div>

</div>

<div class="cards">

<div class="card">
<h3>Total Vendas</h3>
<h2 id="vendas">R$ 0,00</h2>
</div>

<div class="card">
<h3>Pedidos</h3>
<h2 id="pedidos">0</h2>
</div>

<div class="card">
<h3>Ticket Médio</h3>
<h2 id="ticket">R$ 0,00</h2>
</div>

<div class="card">
<h3>Pix</h3>
<h2 id="pix">0%</h2>
</div>

</div>

<div class="filtros">

<label>Início</label>
<input type="date" id="inicio">

<label>Fim</label>
<input type="date" id="fim">

<input
type="text"
placeholder="Pesquisar">

<button onclick="carregar()">

Pesquisar

</button>

</div>

<table id="tabela">

<thead>

<tr>

<th>ID</th>
<th>Data</th>
<th>Total</th>
<th>Pagamento</th>
<th>Ações</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

<canvas id="grafico"></canvas>

<script>

let chart;

async function carregar(){

    const resposta = await fetch(
        "https://spdv-enterprises.onrender.com/relatorios/vendas"
    );

    const dados = await resposta.json();

    const tbody = document.querySelector("#tabela tbody");

    tbody.innerHTML = "";

    let total = 0;

    dados.forEach(v => {

        total += Number(v.total);

        tbody.innerHTML += `
        <tr>

            <td>${v.id}</td>

            <td>${new Date(v.data).toLocaleString("pt-BR")}</td>

            <td>R$ ${Number(v.total).toFixed(2)}</td>

            <td>${v.forma_pagamento || "-"}</td>

            <td>

                <button
                    onclick="apagarVenda(${v.id})"
                    style="
                        background:#dc2626;
                        color:white;
                        border:none;
                        padding:8px 12px;
                        border-radius:6px;
                        cursor:pointer;
                    ">

                    🗑 Excluir

                </button>

            </td>

        </tr>
        `;

    });

    document.getElementById("vendas").innerHTML =
        "R$ " + total.toFixed(2);

    document.getElementById("pedidos").innerHTML =
        dados.length;

    document.getElementById("ticket").innerHTML =
        "R$ " + (dados.length ? total / dados.length : 0).toFixed(2);

    const pix = dados.filter(
        x => x.forma_pagamento === "PIX"
    ).length;

    document.getElementById("pix").innerHTML =
        (dados.length ? ((pix / dados.length) * 100).toFixed(1) : "0.0") + "%";

    grafico(dados);

}

function grafico(dados){

const ctx=document.getElementById("grafico");

if(chart) chart.destroy();

chart=new Chart(ctx,{

type:"bar",

data:{

labels:dados.map(x=>x.data),

datasets:[{

label:"Vendas",

data:dados.map(x=>x.total)

}]

}

});

}

function exportarExcel(){

let tabela=document.getElementById("tabela").outerHTML;

let arquivo='data:application/vnd.ms-excel,'+encodeURIComponent(tabela);

let a=document.createElement("a");

a.href=arquivo;

a.download="relatorio.xls";

a.click();

}

async function apagarVenda(id){

    if(!confirm("Deseja realmente cancelar esta venda?")){
        return;
    }

    const resposta = await fetch(

        "https://spdv-enterprises.onrender.com/vendas/" + id,

        {
            method:"DELETE"
        }

    );

    const dados = await resposta.json();

    alert(dados.mensagem);

    carregar();

}

carregar();

</script>

<script src="js/layout.js"></script>
<script src="js/menu.js"></script>

</body>
</html>
